[build]
  publish = "webapp"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/web-config"
  to = "/.netlify/functions/web-config"
  status = 200

[[redirects]]
  from = "/api/stripe/create-checkout-session"
  to = "/.netlify/functions/stripe-create-checkout-session"
  status = 200

[[redirects]]
  from = "/api/stripe/checkout-status"
  to = "/.netlify/functions/stripe-checkout-status"
  status = 200

[[redirects]]
  from = "/api/stripe/billing-status"
  to = "/.netlify/functions/stripe-billing-status"
  status = 200

[[redirects]]
  from = "/api/stripe/create-portal-session"
  to = "/.netlify/functions/stripe-create-portal-session"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
